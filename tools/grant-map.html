<style>
  :root {
    --bg: #0f1117; --surface: #181c27; --surface2: #1f2436;
    --border: #2a3050; --gold: #c9a84c; --gold-light: #e2c67a;
    --gold-faint: rgba(201,168,76,0.08); --text: #e8eaf0;
    --text-muted: #8890aa; --text-dim: #555f7a;
    --green: #4ec9a4; --blue: #5b8dee; --red: #e05c5c;
    --orange: #e07a3c; --purple: #9b72d9; --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow: hidden; }

  .header {
    padding: 18px 40px 14px;
    background: linear-gradient(135deg,#0f1117 60%,#1a1e2e);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px; height: 70px;
  }
  .header-left { display: flex; align-items: center; gap: 20px; }
  .header-left .eyebrow { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); }
  .header-left h1 { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 700; color: #fff; }
  .toggle-wrap { display: flex; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 3px; gap: 3px; }
  .toggle-btn { padding: 6px 18px; border-radius: 5px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; color: var(--text-muted); border: none; background: transparent; font-family: 'DM Sans',sans-serif; white-space: nowrap; }
  .toggle-btn.active { background: var(--gold); color: #1a1400; font-weight: 600; }
  .toggle-btn:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.04); }

  .stats-row { display: flex; align-items: center; padding: 0 40px; background: var(--surface); border-bottom: 1px solid var(--border); height: 44px; gap: 0; overflow-x: auto; }
  .stat-item { padding: 0 22px 0 0; border-right: 1px solid var(--border); margin-right: 22px; white-space: nowrap; flex-shrink: 0; }
  .stat-item:last-child { border-right: none; }
  .stat-val { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600; color: var(--gold-light); }
  .stat-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-left: 6px; }

  .main { display: flex; height: calc(100vh - 114px); }
  .map-wrap { flex: 1; position: relative; overflow: hidden; background: #0c0f18; }
  .sidebar { width: 280px; flex-shrink: 0; border-left: 1px solid var(--border); background: var(--surface); overflow-y: auto; }

  /* Single SVG approach - both maps coexist, Bexar is a group that zooms in */
  #main-svg { width: 100%; height: 100%; }
  .county-tx { stroke: #1e2540; stroke-width: 0.4px; cursor: pointer; transition: stroke 0.15s, stroke-width 0.15s; }
  .county-tx:hover { stroke: rgba(201,168,76,0.8); stroke-width: 1.2px; }
  .state-border { fill: none; stroke: #3a4565; stroke-width: 1.5px; pointer-events: none; }
  .bexar-outline { fill: none; stroke: var(--gold); stroke-width: 2px; pointer-events: none; }

  /* Org dots */
  .org-dot { cursor: pointer; transition: opacity 0.2s; }
  .org-dot:hover { opacity: 1 !important; }
  .pulse-ring { fill: none; pointer-events: none; }

  /* Tooltip */
  .tooltip {
    position: absolute; pointer-events: none;
    background: #1c2238; border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px;
    font-size: 12px; line-height: 1.65; z-index: 100;
    max-width: 240px; box-shadow: 0 6px 24px rgba(0,0,0,0.6);
    opacity: 0; transition: opacity 0.12s; min-width: 160px;
  }
  .tooltip.visible { opacity: 1; }
  .tt-title { font-weight: 600; color: var(--gold-light); margin-bottom: 2px; font-size: 12.5px; }
  .tt-sub { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 5px; }
  .tt-amt { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--green); }
  .tt-detail { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .tt-scope { font-size: 10px; color: var(--text-dim); margin-top: 4px; font-style: italic; }

  /* Legend */
  .legend-panel { padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .legend-title { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); margin-bottom: 8px; }
  .legend-grad { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .legend-bar { flex: 1; height: 9px; border-radius: 4px; }
  .legend-labels { display: flex; justify-content: space-between; font-size: 9px; color: var(--text-dim); font-family: 'DM Mono', monospace; }

  /* Sidebar items */
  .sb-section { padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .sb-title { font-family: 'Playfair Display', serif; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
  .sb-row { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; border-bottom: 1px solid rgba(42,48,80,0.35); cursor: pointer; }
  .sb-row:last-child { border-bottom: none; }
  .sb-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; margin-top: 3px; }
  .sb-name { flex: 1; font-size: 11.5px; color: var(--text-muted); line-height: 1.3; }
  .sb-amt { font-family: 'DM Mono', monospace; font-size: 10.5px; color: var(--gold-light); flex-shrink: 0; }
  .scope-tag { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 8px; margin-left: 3px; vertical-align: middle; }
  .st-bexar { background: rgba(78,201,164,0.15); color: var(--green); }
  .st-regional { background: rgba(201,168,76,0.15); color: var(--gold); }
  .st-national { background: rgba(91,141,238,0.15); color: var(--blue); }
  .note-card { background: var(--surface2); border-radius: 6px; padding: 10px 12px; margin-top: 10px; font-size: 11px; color: var(--text-dim); line-height: 1.6; border-left: 2px solid var(--gold); }

  /* Zoom controls */
  .zoom-controls { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 4px; z-index: 50; }
  .zoom-btn { width: 32px; height: 32px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted); font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .zoom-btn:hover { background: var(--surface2); color: var(--text); }

  /* View label */
  .view-label {
    position: absolute; top: 14px; left: 14px;
    background: rgba(15,17,23,0.85); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 12px;
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-dim); pointer-events: none; z-index: 50;
    transition: opacity 0.3s;
  }

  .loading { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 200; background: #0c0f18; }
  .loading-ring { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.75s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 11px; color: var(--text-dim); }
</style>

  </div>
  <div class="sidebar" id="sidebar"></div>
</div>

const tooltip = document.getElementById('tooltip');
function showTT(e, html) {
  tooltip.innerHTML = html;
  tooltip.classList.add('visible');
  moveTT(e);
}
function hideTT() { tooltip.classList.remove('visible'); }
function moveTT(e) {
  let x = e.clientX + 14, y = e.clientY - tooltip.offsetHeight / 2;
  const ww = window.innerWidth, wh = window.innerHeight;
  if (x + tooltip.offsetWidth > ww - 16) x = e.clientX - tooltip.offsetWidth - 14;
  if (y < 8) y = 8;
  if (y + tooltip.offsetHeight > wh - 8) y = wh - tooltip.offsetHeight - 8;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}
document.addEventListener('mousemove', e => { if (tooltip.classList.contains('visible')) moveTT(e); });

// BUILD MAP  —  county layer in zoomed <g>, dots in fixed overlay
// ══════════════════════════════════════════════════════════════
async function buildMap(us) {
  usData = us;
  document.getElementById('loading').style.display = 'none';

  const svg = d3.select('#main-svg');
  svgEl = svg;
  const w = W(), h = H();

  // ── Projection (shared by both layers) ───────────────────
  const proj = d3.geoAlbers()
    .rotate([100, 0]).center([0, 31.5])
    .parallels([27, 37])
    .scale(Math.min(w, h) * 2.4)
    .translate([w / 2, h / 2]);
  const path = d3.geoPath().projection(proj);

  const allCounties = topojson.feature(us, us.objects.counties);
  const txCounties  = allCounties.features.filter(d => d.id.toString().startsWith('48'));
  const stateMesh   = topojson.mesh(us, us.objects.states, (a,b) => a !== b);
  const bexarFeat   = txCounties.find(d => d.id.toString() === '48029');

  // ── Precompute projected dot positions ───────────────────
  // (projection never changes, so we cache these)
  ORG_DOTS.forEach(o => {
    [o._px, o._py] = proj([o.lon, o.lat]);
  });

  // ── Layer 1: zoomed map group ─────────────────────────────
  g = svg.append('g').attr('class', 'map-root');

  g.append('g').attr('class','counties-layer')
    .selectAll('.county-tx')
    .data(txCounties)
    .join('path')
    .attr('class','county-tx')
    .attr('d', path)
    .attr('fill', d => countyFill(d.id.toString()))
    .on('mouseover', function(e, d) {
      if (currentView === 'bexar') return; // suppress county hovers in bexar mode
      const fips = d.id.toString();
      const info = COUNTY_DIRECT[fips];
      const isReach = STATEWIDE_REACH_FIPS.includes(fips);
      if (fips === '48029') {
        showTT(e, `<div class="tt-title">Bexar County</div><div class="tt-sub">Primary Service Area</div><div class="tt-amt">~$13,820,000</div><div class="tt-detail">170+ organizations · 95% of portfolio<br><em style="color:var(--gold)">Click to drill into Bexar detail →</em></div>`);
      } else if (info) {
        const amtStr = '$'+(info.amt/1000).toFixed(0)+'K';
        showTT(e, `<div class="tt-title">${info.label}</div><div class="tt-sub">${info.tier==='reach'?'Regional Org Reach':'Direct Grants'}</div><div class="tt-amt">${amtStr}</div><div class="tt-detail">${info.orgs.slice(0,3).join('<br>')}</div>${info.note?`<div class="tt-scope">${info.note}</div>`:''}`);
      } else if (isReach) {
        showTT(e, `<div class="tt-title">${d.properties?.name||''} County</div><div class="tt-sub">Statewide Org Reach</div><div class="tt-detail" style="color:var(--text-dim)">Special Olympics TX · Texas Ramp Project<br>Texas Diaper Bank · Meadows Policy Inst.</div>`);
      } else {
        showTT(e, `<div class="tt-title">${d.properties?.name||''} County</div><div class="tt-detail" style="color:var(--text-dim)">No direct grants</div>`);
      }
    })
    .on('mousemove', moveTT)
    .on('mouseleave', hideTT)
    .on('click', function(e, d) {
      if (d.id.toString() === '48029') animateToView('bexar');
    });

    saLimitsG.selectAll('path').data(features).join('path')
      .attr('d', path)
      .attr('fill',   'none')
      .attr('stroke', 'rgba(91,141,238,0.45)')
      .attr('stroke-width', 0.4)
      .attr('stroke-dasharray','2,3');
    saLimitsG.append('text')
      .attr('x', saLblPos[0]).attr('y', saLblPos[1])
      .attr('text-anchor','middle')
      .attr('fill','rgba(91,141,238,0.28)')
      .attr('font-size',9).attr('font-family','DM Sans').attr('letter-spacing','0.1em')
      .text('SAN ANTONIO CITY LIMITS');
  }

  // Draw approximate immediately — upgrade silently if Census TIGER responds
  drawSALimits(SA_LIMITS_APPROX);
  fetch('https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/Places_CouSub_ConCity_SubMCD/MapServer/14/query'
    + '?where=GEOID%3D%274865000%27&outFields=NAME&outSR=4326&f=geojson&geometryPrecision=4')
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(data => {
      if (data.features && data.features.length) {
        saLimitsG.selectAll('*').remove(); // clear approximate
        drawSALimits(data);               // replace with exact
      }
    })
    .catch(() => {}); // keep approximate on failure

  // ── Layer 2: FIXED overlay for org dots ──────────────────
  // This group lives OUTSIDE the zoomed <g> so dot sizes stay
  // constant in screen pixels regardless of zoom level.
  const overlay = svg.append('g').attr('class','dots-overlay').attr('opacity', 0);

  // Per-org groups — each positioned at the org's SCREEN coords
  // (updated on every zoom event)
  const orgGroups = overlay.selectAll('.org-group')
    .data(ORG_DOTS)
    .join('g')
    .attr('class','org-group')
    .attr('transform', d => `translate(${d._px},${d._py})`); // initial: at projection coords (= screen coords at k=1)

  // Dot radius helper (screen pixels, constant at all zoom levels)
  function dotR(d) {
    if (d.amt >= 1000000) return 6;
    if (d.amt >= 400000)  return 5;
    if (d.amt >= 200000)  return 4;
    if (d.amt >= 100000)  return 3;
    if (d.amt >= 50000)   return 2.5;
    return 1.8;
  }

  // Pulse rings (only for large grants, lives at origin of org-group)
  orgGroups.filter(d => d.amt >= 200000 && d.scope !== 'regional')
    .each(function(d) {
      const ring = d3.select(this).append('circle')
        .attr('class','pulse-ring')
        .attr('cx',0).attr('cy',0)
        .attr('r', dotR(d))
        .attr('stroke', dotColor(d)).attr('stroke-width', 1.2)
        .attr('fill','none').attr('opacity', 0.5);
      (function pulse() {
        ring.attr('r', dotR(d)).attr('opacity', 0.5)
          .transition().duration(2000).ease(d3.easeCubicOut)
          .attr('r', dotR(d) + 14).attr('opacity', 0)
          .on('end', pulse);
      })();
    });

  // Main dots (centered at origin of org-group)
  orgGroups.append('circle')
    .attr('class','org-dot')
    .attr('cx',0).attr('cy',0)
    .attr('r', d => dotR(d))
    .attr('fill', d => dotColor(d))
    .attr('opacity', d => d.scope === 'regional' ? 0.65 : 0.9)
    .attr('stroke', '#0c0f18').attr('stroke-width', 1)
    .on('mouseover', function(e, d) {
      d3.select(this).attr('stroke','#fff').attr('stroke-width', 1.5).attr('opacity',1);
      const scopeStr = d.scope === 'regional'
        ? '⚠ Regional — extends beyond Bexar County'
        : '✓ San Antonio / Bexar County';
      showTT(e, `<div class="tt-title">${d.name}</div><div class="tt-sub">${d.area} · ${d.bucket}</div><div class="tt-amt">$${d.amt.toLocaleString()}</div><div class="tt-scope">${scopeStr}</div>`);
    })
    .on('mousemove', moveTT)
    .on('mouseleave', function(e, d) {
      d3.select(this).attr('stroke','#0c0f18').attr('stroke-width',1)
        .attr('opacity', d.scope==='regional' ? 0.65 : 0.9);
      hideTT();
    });

  // ── Neighbourhood labels (overlay, shown only in bexar view) ─
  const nLabels = [
    {name:'Downtown',        lon:-98.493, lat:29.427},
    {name:'Medical Center',  lon:-98.579, lat:29.503},
    {name:'North SA',        lon:-98.470, lat:29.555},
    {name:'South SA',        lon:-98.516, lat:29.370},
    {name:'East SA',         lon:-98.430, lat:29.420},
    {name:'UTSA / Far NW',   lon:-98.618, lat:29.578},
    {name:'SW SA',           lon:-98.595, lat:29.415},
  ];
  const labOverlay = svg.append('g').attr('class','neigh-labels').attr('opacity',0).attr('pointer-events','none');
  nLabels.forEach(n => {
    const [nx, ny] = proj([n.lon, n.lat]);
    labOverlay.append('text')
      .attr('class','neigh-label').attr('data-lon', n.lon).attr('data-lat', n.lat)
      .attr('x', nx).attr('y', ny)
      .attr('text-anchor','middle').attr('fill','rgba(255,255,255,0.13)')
      .attr('font-size',11).attr('font-family','DM Sans').attr('letter-spacing','0.06em')
      .attr('font-weight','500')
      .text(n.name.toUpperCase());
  });

  // ── Compute target transforms ─────────────────────────────
  const svgW = W(), svgH = H();
  texasTransform = d3.zoomIdentity;

  const [[bx0,by0],[bx1,by1]] = path.bounds(bexarFeat);
  const bPad = 52;
  const bScale = Math.min(
    (svgW - bPad*2) / (bx1 - bx0),
    (svgH - bPad*2) / (by1 - by0)
  ) * 0.9;
  const bTx = svgW/2 - bScale*(bx0+bx1)/2;
  const bTy = svgH/2 - bScale*(by0+by1)/2;
  bexarTransform = d3.zoomIdentity.translate(bTx, bTy).scale(bScale);

  // ── Zoom behaviour ────────────────────────────────────────
  // KEY FIX: on every zoom event we reposition the overlay groups
  // so dots stay at correct map positions but their sizes stay in
  // screen-pixel space (no scaling artefact).
  zoom = d3.zoom()
    .scaleExtent([0.5, 120])
    .on('zoom', function(event) {
      const t = event.transform;
      // Move the county layer
      g.attr('transform', t);
      // Reposition each org-group to its screen position
      overlay.selectAll('.org-group')
        .attr('transform', d => `translate(${t.applyX(d._px)},${t.applyY(d._py)})`);
      // Reposition neighbourhood labels
      labOverlay.selectAll('.neigh-label')
        .attr('x', function() {
          const [px] = proj([+d3.select(this).attr('data-lon'), +d3.select(this).attr('data-lat')]);
          return t.applyX(px);
        })
        .attr('y', function() {
          const [, py] = proj([+d3.select(this).attr('data-lon'), +d3.select(this).attr('data-lat')]);
          return t.applyY(py);
        });
    });

  svg.call(zoom);

  // Zoom control buttons
  document.getElementById('zi').onclick = () => svgEl.transition().duration(300).call(zoom.scaleBy, 1.6);
  document.getElementById('zo').onclick = () => svgEl.transition().duration(300).call(zoom.scaleBy, 0.625);
  document.getElementById('zr').onclick = () => {
    const t = currentView === 'texas' ? texasTransform : bexarTransform;
    svgEl.transition().duration(500).call(zoom.transform, t);
  };

  buildTexasSidebar();
}

// ══════════════════════════════════════════════════════════════
// ANIMATED VIEW TRANSITION
// ══════════════════════════════════════════════════════════════
function animateToView(view) {
  if (view === currentView) return;
  currentView = view;

  const overlay   = d3.select('.dots-overlay');
  const labTx     = d3.select('.bexar-label-tx');
  const saBound   = d3.select('.sa-city-limits-group');
  const neighLabs = d3.select('.neigh-labels');

  document.getElementById('btn-texas').classList.toggle('active', view === 'texas');
  document.getElementById('btn-bexar').classList.toggle('active', view === 'bexar');

  if (view === 'bexar') {
    document.getElementById('view-label').textContent = 'Bexar County — San Antonio Detail';
    buildBexarSidebar();
    // Animate zoom — the zoom handler auto-repositions overlay dots
    svgEl.transition().duration(950).ease(d3.easeCubicInOut)
      .call(zoom.transform, bexarTransform)
      .on('end', () => {
        overlay.transition().duration(450).attr('opacity', 1);
        neighLabs.transition().duration(450).attr('opacity', 1);
        saBound.transition().duration(300).attr('opacity', 1);
        labTx.transition().duration(300).attr('opacity', 0);
      });
  } else {
    document.getElementById('view-label').textContent = 'Texas — All Counties';
    buildTexasSidebar();
    // Fade out dots first, then zoom back
    overlay.transition().duration(280).attr('opacity', 0);
    neighLabs.transition().duration(200).attr('opacity', 0);
    saBound.transition().duration(200).attr('opacity', 0);
    setTimeout(() => {
      svgEl.transition().duration(850).ease(d3.easeCubicInOut)
        .call(zoom.transform, texasTransform)
        .on('end', () => labTx.transition().duration(300).attr('opacity', 1));
    }, 300);
  }
}

// ══════════════════════════════════════════════════════════════
// SIDEBARS
// ══════════════════════════════════════════════════════════════
function buildTexasSidebar() {
  const counties = Object.entries(COUNTY_DIRECT).sort((a,b) => b[1].amt - a[1].amt);
  const tierColor = t => t==='primary'?'#c9a84c':t==='direct'?'#7a5c20':'#3a2e14';
  const tierLabel = t => t==='primary'?'Primary':t==='direct'?'Direct':'Reach';

  let html = `
    <div class="legend-panel">
      <div class="legend-title">Grant Intensity</div>
      <div class="legend-grad">
        <span style="font-size:9px;color:var(--text-dim);font-family:'DM Mono',monospace">None</span>
        <div class="legend-bar" style="background:linear-gradient(90deg,#141820,#1f2830,#3a2e14,#7a5c20,#c9a84c)"></div>
        <span style="font-size:9px;color:var(--text-dim);font-family:'DM Mono',monospace">$13.8M</span>
      </div>
      <div style="margin-top:8px;display:flex;gap:12px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:5px;font-size:9.5px;color:var(--text-dim)"><div style="width:8px;height:8px;border-radius:1px;background:#c9a84c"></div>Primary (Bexar)</div>
        <div style="display:flex;align-items:center;gap:5px;font-size:9.5px;color:var(--text-dim)"><div style="width:8px;height:8px;border-radius:1px;background:#7a5c20"></div>Direct grants</div>
        <div style="display:flex;align-items:center;gap:5px;font-size:9.5px;color:var(--text-dim)"><div style="width:8px;height:8px;border-radius:1px;background:#3a2e14"></div>Regional reach</div>
        <div style="display:flex;align-items:center;gap:5px;font-size:9.5px;color:var(--text-dim)"><div style="width:8px;height:8px;border-radius:1px;background:#1f2830"></div>Statewide orgs</div>
      </div>
      <div style="margin-top:10px;font-size:10px;color:var(--gold);cursor:pointer" onclick="animateToView('bexar')">→ Click Bexar or toggle to drill in</div>
      <div style="margin-top:8px;display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text-muted)"><span style="color:var(--gold);font-size:13px">♥</span> Greehey Family Foundation — 250 W Nottingham Dr, Ste 305</div>
    </div>
    <div class="sb-section">
      <div class="sb-title">Counties with Grant Activity</div>`;

  counties.forEach(([fips, info]) => {
    const amtStr = info.amt >= 1000000 ? '$'+(info.amt/1000000).toFixed(1)+'M' : '$'+(info.amt/1000).toFixed(0)+'K';
    html += `<div class="sb-row">
      <div class="sb-dot" style="background:${tierColor(info.tier)}"></div>
      <div class="sb-name">${info.label}<br><span style="font-size:9.5px;color:var(--text-dim)">${info.orgs[0]}</span></div>
      <div class="sb-amt">${amtStr}</div>
    </div>`;
  });

  html += `</div>
    <div class="sb-section">
      <div class="sb-title">Statewide Org Reach</div>
      <p style="font-size:11px;color:var(--text-dim);line-height:1.6">The following orgs have statewide mandates but Greehey grants are directed to San Antonio programs. Their reach is shown in faint blue across major TX metros.</p>
      <div style="margin-top:8px;display:flex;flex-direction:column;gap:4px">
        ${['Texas Ramp Project','Special Olympics Texas','Texas Diaper Bank','Meadows Mental Health Policy Inst.','Junior Achievement of South Texas','Veterans Assistance Dogs of Texas'].map(n=>`<div style="font-size:11px;color:var(--text-muted);padding:3px 0;border-bottom:1px solid rgba(42,48,80,0.3)">• ${n}</div>`).join('')}
      </div>
      <div class="note-card">
        <strong style="color:var(--text)">Landa Gardens Conservancy</strong> ($5K, New Braunfels) is the only grant to an org exclusively serving outside Bexar County with no direct Bexar benefit.
      </div>
    </div>`;

  document.getElementById('sidebar').innerHTML = html;
}

function buildBexarSidebar() {
  // Group by area, sorted by total
  const byArea = {};
  ORG_DOTS.forEach(o => {
    if (!byArea[o.area]) byArea[o.area] = { total:0, orgs:[] };
    byArea[o.area].total += o.amt;
    byArea[o.area].orgs.push(o);
  });
  const areas = Object.entries(byArea).sort((a,b) => b[1].total - a[1].total);

  let html = `
    <div class="legend-panel">
      <div class="legend-title">Focus Area</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">
        ${Object.entries(BUCKET_COLORS).map(([k,c])=>`<div style="display:flex;align-items:center;gap:5px;font-size:9.5px;color:var(--text-dim)"><div style="width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0"></div>${k}</div>`).join('')}
        <div style="display:flex;align-items:center;gap:5px;font-size:9.5px;color:var(--text-dim)"><div style="width:8px;height:8px;border-radius:50%;background:#9b72d9;flex-shrink:0"></div>Regional</div>
      </div>
      <div style="margin-top:8px;font-size:10px;color:var(--text-dim)">Dot size ∝ grant amount · Hover for detail</div>
      <div style="margin-top:6px;display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text-muted)"><span style="color:var(--gold);font-size:13px">♥</span> Foundation HQ — 250 W Nottingham Dr, Ste 305</div>
      <div style="margin-top:6px;font-size:10px;color:var(--gold);cursor:pointer" onclick="animateToView('texas')">← Back to Texas overview</div>
    </div>`;

  areas.forEach(([area, {total, orgs}]) => {
    const tStr = total >= 1000000 ? '$'+(total/1000000).toFixed(2)+'M' : '$'+(total/1000).toFixed(0)+'K';
    html += `<div class="sb-section">
      <div class="sb-title">${area} · <span style="color:var(--gold-light)">${tStr}</span></div>`;
    orgs.sort((a,b)=>b.amt-a.amt).forEach(o => {
      const scopeTag = o.scope === 'regional'
        ? `<span class="scope-tag st-regional">Regional</span>`
        : `<span class="scope-tag st-bexar">Bexar</span>`;
      html += `<div class="sb-row">
        <div class="sb-dot" style="background:${dotColor(o)};border-radius:50%"></div>
        <div class="sb-name">${o.name}${scopeTag}</div>
        <div class="sb-amt">$${o.amt >= 1000 ? (o.amt/1000).toFixed(0)+'K' : o.amt}</div>
      </div>`;
    });
    html += '</div>';
  });

  document.getElementById('sidebar').innerHTML = html;
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
async function init() {
  try {
    const us = await d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json');
    await buildMap(us);
  } catch(err) {
    document.getElementById('loading').innerHTML = `
      <div style="text-align:center;padding:40px;color:var(--text-muted)">
        <div style="font-size:2rem;margin-bottom:12px">⚠</div>
        <div style="font-size:13px">Map data could not load.<br>Open this file in a browser with internet access.</div>
        <div style="margin-top:10px;font-size:10px;color:var(--text-dim)">${err.message}</div>
      </div>`;
  }
}
init();
</script>

</html>
